services:
  app:
    image: fsopen-todo-front
    build:
      context: ./todo-frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:8080/api
    container_name: fsopen_todo_front
    depends_on:
      - server
  
  nginx:
    image: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: fsopen_todo_reverse_proxy
    depends_on:
      - app
      - server

  server:
    image: fsopen-todo-backend
    build:
      context: ./todo-backend
      dockerfile: Dockerfile
    environment:
      - MONGO_URL=mongodb://mongo-demo:mongo-demo@mongo:27017/mongo-demo-db
      - REDIS_URL=redis://redis:6378
      - PORT=3000
    container_name: fsopen_todo_backend
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo
    ports:
      - 3456:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo-demo
      MONGO_INITDB_ROOT_PASSWORD: mongo-demo
      MONGO_INITDB_DATABASE: mongo-demo-db
    volumes:
      - ./todo-backend/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - fso-mongo-data:/data/db
  
  redis:
    image: redis:7
    ports:
      - 6378:6378
    environment:
      - REDIS_URL=redis://localhost:6378
    volumes:
      - fso-redis-data:/data
    command: [
      "redis-server", 
      "--appendonly", "yes", 
      "--port", "6378", 
      "--save", "60", "1", 
      "--loglevel warning"
    ]

volumes:
  fso-mongo-data:
  fso-redis-data: